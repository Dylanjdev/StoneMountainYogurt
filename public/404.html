<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback: send unknown paths to index with encoded route.
      // Keep this at 0 for custom-domain root deploys. Use 1 for /repo-name/ pages.
      const pathSegmentsToKeep = 0

      const l = window.location
      const redirect =
        l.protocol +
        '//' +
        l.hostname +
        (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash

      l.replace(redirect)
    </script>
  </head>
  <body></body>
</html>
